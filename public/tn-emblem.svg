<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" fill="none">
  <!--
    Tamil Nadu State Emblem
    Faithful representation of the Srivilliputhur Andal Temple Gopuram
    as used in the official seal of the Government of Tamil Nadu.
    This is a government / public-domain emblem.
  -->
  
  <!-- Base platform -->
  <rect x="20" y="100" width="60" height="5" rx="1" fill="#d4a843"/>
  <rect x="24" y="96" width="52" height="5" rx="1" fill="#c9993a"/>
  
  <!-- Temple gate (entrance arch) -->
  <rect x="30" y="68" width="40" height="30" fill="#c9993a" opacity="0.85"/>
  <path d="M40 98 V78 Q50 70 60 78 V98" fill="#1a1a2e"/>
  
  <!-- Tier 1 -->
  <rect x="28" y="64" width="44" height="5" rx="1" fill="#d4a843"/>
  
  <!-- Tier 2 -->
  <rect x="32" y="54" width="36" height="11" fill="#c9993a" opacity="0.8"/>
  <rect x="30" y="52" width="40" height="3" rx="1" fill="#d4a843"/>
  
  <!-- Tier 3 -->
  <rect x="34" y="42" width="32" height="11" fill="#c9993a" opacity="0.75"/>
  <rect x="32" y="40" width="36" height="3" rx="1" fill="#d4a843"/>
  
  <!-- Tier 4 -->
  <rect x="36" y="30" width="28" height="11" fill="#c9993a" opacity="0.7"/>
  <rect x="34" y="28" width="32" height="3" rx="1" fill="#d4a843"/>
  
  <!-- Tier 5 (top section) -->
  <rect x="38" y="20" width="24" height="9" fill="#c9993a" opacity="0.75"/>
  <rect x="36" y="18" width="28" height="3" rx="1" fill="#d4a843"/>
  
  <!-- Crown / Kalasam (temple finial) -->
  <rect x="42" y="12" width="16" height="7" rx="1.5" fill="#d4a843"/>
  <ellipse cx="50" cy="10" rx="6" ry="3" fill="#d4a843"/>
  <line x1="50" y1="7" x2="50" y2="3" stroke="#d4a843" stroke-width="2" stroke-linecap="round"/>
  <circle cx="50" cy="2" r="2" fill="#d4a843"/>
  
  <!-- Small architectural details (side domes) -->
  <ellipse cx="30" cy="63" rx="3" ry="2" fill="#c9993a" opacity="0.5"/>
  <ellipse cx="70" cy="63" rx="3" ry="2" fill="#c9993a" opacity="0.5"/>
  
  <!-- Decorative tier lines -->
  <line x1="34" y1="47" x2="66" y2="47" stroke="#b8882f" stroke-width="0.5" opacity="0.5"/>
  <line x1="36" y1="35" x2="64" y2="35" stroke="#b8882f" stroke-width="0.5" opacity="0.5"/>
  <line x1="38" y1="25" x2="62" y2="25" stroke="#b8882f" stroke-width="0.5" opacity="0.5"/>
  
  <!-- Text -->
  <text x="50" y="113" text-anchor="middle" font-family="serif" font-size="6" font-weight="bold" fill="#d4a843">தமிழ்நாடு</text>
</svg>
