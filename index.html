<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TN Election Dashboard | Tamil Nadu Elections 1952–2026 | Candidate Data & Analytics</title>
    <meta name="description" content="India's most comprehensive Tamil Nadu election dashboard. Explore candidate criminal records, assets, constituency data, historical trends from 1952-2026. Data from ECI, TNSEC & ADR affidavits." />
    <meta name="keywords" content="Tamil Nadu election 2026, TN election dashboard, candidate criminal records, election results, constituency analysis, DMK, AIADMK, BJP, election data India" />
    <meta property="og:title" content="TN Election Dashboard | Tamil Nadu Elections 1952–2026" />
    <meta property="og:description" content="Explore candidate criminal records, assets, constituency data & historical trends. India's most comprehensive Tamil Nadu election analytics platform." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tn-election-dashboard.vercel.app" />
    <link rel="canonical" href="https://tn-election-dashboard.vercel.app" />

    <!-- Block AI/LLM training on this content -->
    <meta name="robots" content="index, follow, noai, noimageai" />
    <meta name="googlebot" content="index, follow, noai, noimageai" />

    <!-- TDM (Text and Data Mining) Reservation Protocol -->
    <meta name="tdm-reservation" content="1" />

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7035008199270371" crossorigin="anonymous"></script>

    <!-- Content protection: disable easy copy/scrape -->
    <script>
      (function(){
        // Disable right-click context menu
        document.addEventListener('contextmenu', function(e){ e.preventDefault(); });
        // Disable common keyboard shortcuts for view-source / dev tools
        document.addEventListener('keydown', function(e){
          // Ctrl+U (view source), Ctrl+Shift+I (devtools), Ctrl+Shift+J (console), F12
          if((e.ctrlKey && e.key==='u')||(e.ctrlKey&&e.shiftKey&&(e.key==='I'||e.key==='i'))||(e.ctrlKey&&e.shiftKey&&(e.key==='J'||e.key==='j'))||e.key==='F12'){
            e.preventDefault();
          }
          // Ctrl+S (save page)
          if(e.ctrlKey && e.key==='s'){ e.preventDefault(); }
        });
        // Disable text selection via CSS injection
        var s=document.createElement('style');
        s.textContent='body{-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;}input,textarea,select{-webkit-user-select:text;-moz-user-select:text;-ms-user-select:text;user-select:text;}';
        document.head.appendChild(s);
        // Disable drag
        document.addEventListener('dragstart', function(e){ e.preventDefault(); });
        // Disable copy
        document.addEventListener('copy', function(e){ e.preventDefault(); });
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <!-- Pre-React loading screen (replaced when React mounts) -->
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#0f172a;color:#f8fafc;font-family:system-ui,-apple-system,sans-serif;">
        <div style="font-size:2.5rem;margin-bottom:1rem;">🗳️</div>
        <h1 style="font-size:1.25rem;font-weight:700;margin:0 0 0.5rem;">TN Election Dashboard</h1>
        <p style="font-size:0.75rem;color:#94a3b8;margin:0 0 1.5rem;">Loading election data...</p>
        <div style="width:2rem;height:2rem;border:2px solid rgba(245,158,11,0.3);border-top-color:#f59e0b;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
        <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
