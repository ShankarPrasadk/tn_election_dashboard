    <!-- Content protection: disable easy copy/scrape -->
    <script>
      (function(){
        // Disable right-click context menu
        document.addEventListener('contextmenu', function(e){ e.preventDefault(); });
        // Disable common keyboard shortcuts for view-source / dev tools
        document.addEventListener('keydown', function(e){
          // Ctrl+U (view source), Ctrl+Shift+I (devtools), Ctrl+Shift+J (console), F12
          if((e.ctrlKey && e.key==='u')||(e.ctrlKey&&e.shiftKey&&(e.key==='I'||e.key==='i'))||(e.ctrlKey&&e.shiftKey&&(e.key==='J'||e.key==='j'))||e.key==='F12'){
            e.preventDefault();
          }
          // Ctrl+S (save page)
          if(e.ctrlKey && e.key==='s'){ e.preventDefault(); }
        });
        // Disable text selection via CSS injection
        var s=document.createElement('style');
        s.textContent='body{-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;}input,textarea,select{-webkit-user-select:text;-moz-user-select:text;-ms-user-select:text;user-select:text;}';
        document.head.appendChild(s);
        // Disable drag
        document.addEventListener('dragstart', function(e){ e.preventDefault(); });
        // Disable copy
        document.addEventListener('copy', function(e){ e.preventDefault(); });
      })();
    </script>
